name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-backend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/voting-backend:${{ github.sha }} \
                       ./backend

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-frontend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/voting-frontend:${{ github.sha }} \
                       ./frontend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-backend:${{ github.sha }}

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-frontend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            docker compose down
            docker pull yoshithadev/voting-backend:latest
            docker pull yoshithadev/voting-frontend:latest
            docker compose up -d

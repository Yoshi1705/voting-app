name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-backend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/voting-backend:${{ github.sha }} \
                       ./backend

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-frontend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/voting-frontend:${{ github.sha }} \
                       ./frontend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-backend:${{ github.sha }}

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-frontend:${{ github.sha }}